<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETME Visualizer — Phase 1 & 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0d12;
            --bg-secondary: #14141c;
            --bg-panel: #1a1a26;
            --bg-hover: #22222e;
            --border: #2a2a3a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --accent-blue: #4a9eff;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --key-white: #2a2a38;
            --key-black: #1a1a24;
            --grid-line: rgba(255,255,255,0.04);
            --grid-line-beat: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .stats {
            display: flex;
            gap: 24px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .stats .stat-value {
            font-weight: 600;
            color: var(--text-primary);
            margin-left: 6px;
        }

        /* ===== VIEW TABS ===== */
        .view-tabs {
            display: flex;
            gap: 2px;
            padding: 12px 28px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        .view-tab {
            padding: 8px 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .view-tab:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .view-tab.active {
            background: var(--bg-panel);
            border-color: var(--border);
            color: var(--text-primary);
        }
        .view-tab .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        /* ===== PIANO ROLL CONTAINER ===== */
        .roll-container {
            display: flex;
            height: calc(100vh - 110px);
            overflow: hidden;
        }

        /* ===== PIANO KEYBOARD ===== */
        .keyboard {
            width: 54px;
            min-width: 54px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            scrollbar-width: none;
        }
        .keyboard::-webkit-scrollbar { display: none; }
        .key {
            height: var(--note-height);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 6px;
            font-size: 8px;
            font-weight: 500;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        .key.black {
            background: var(--key-black);
            color: var(--text-muted);
        }
        .key.white {
            background: var(--key-white);
        }
        .key.c-note {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* ===== CANVAS AREA ===== */
        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            position: relative;
        }
        .canvas-wrapper::-webkit-scrollbar { width: 8px; height: 8px; }
        .canvas-wrapper::-webkit-scrollbar-track { background: var(--bg-primary); }
        .canvas-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        canvas {
            display: block;
        }

        /* ===== LEGEND ===== */
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 11px;
            z-index: 50;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .legend h3 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* ===== TOOLTIP ===== */
        .tooltip {
            position: fixed;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 11px;
            pointer-events: none;
            z-index: 200;
            display: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 260px;
        }
        .tooltip .tt-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .tooltip .tt-detail {
            color: var(--text-secondary);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>ETME</span> Visualizer</h1>
        <div class="stats">
            <div>Notes<span class="stat-value" id="stat-notes">—</span></div>
            <div>Regimes<span class="stat-value" id="stat-regimes">—</span></div>
            <div>Melody<span class="stat-value" id="stat-melody">—</span></div>
            <div>Background<span class="stat-value" id="stat-bg">—</span></div>
        </div>
    </div>

    <div class="view-tabs">
        <button class="view-tab active" data-view="raw">
            <span class="dot" style="background: var(--accent-blue);"></span>Piano Roll
        </button>
        <button class="view-tab" data-view="phase1">
            <span class="dot" style="background: var(--accent-green);"></span>Phase 1 — Harmonic Canvas
        </button>
        <button class="view-tab" data-view="phase2">
            <span class="dot" style="background: var(--accent-pink);"></span>Phase 2 — Information Density
        </button>
    </div>

    <div class="roll-container">
        <div class="keyboard" id="keyboard"></div>
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="rollCanvas"></canvas>
        </div>
    </div>

    <div class="legend" id="legend"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
    // ===== CONFIG =====
    const NOTE_HEIGHT = 10;
    const MAX_CANVAS_PX = 8000;    // browser-safe cap
    const PITCH_MIN = 21;          // A0
    const PITCH_MAX = 108;         // C8
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const BLACK_KEYS = [1,3,6,8,10];

    let analysisData = null;
    let currentView = 'raw';
    let MS_PER_PX = 0.8;           // will be auto-calculated

    // roundRect polyfill for older browsers
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
        };
    }

    // ===== LOAD DATA =====
    async function loadData() {
        try {
            const resp = await fetch('etme_analysis.json');
            analysisData = await resp.json();
            document.getElementById('stat-notes').textContent = analysisData.stats.total_notes;
            document.getElementById('stat-regimes').textContent = analysisData.stats.total_regimes;
            document.getElementById('stat-melody').textContent = analysisData.stats.melody_notes;
            document.getElementById('stat-bg').textContent = analysisData.stats.background_notes;
            buildKeyboard();
            render();
        } catch(e) {
            console.error('Failed to load etme_analysis.json:', e);
            document.body.innerHTML += `<div style="color: var(--accent-red); padding: 40px; text-align: center; font-size: 14px;">
                Failed to load etme_analysis.json.<br>Run <code>python export_etme_data.py</code> first, then serve with <code>python -m http.server 3000</code></div>`;
        }
    }

    // ===== KEYBOARD =====
    function buildKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        kb.style.setProperty('--note-height', NOTE_HEIGHT + 'px');
        for (let p = PITCH_MAX; p >= PITCH_MIN; p--) {
            const pc = p % 12;
            const octave = Math.floor(p / 12) - 1;
            const name = NOTE_NAMES[pc];
            const isBlack = BLACK_KEYS.includes(pc);
            const isC = pc === 0;
            const el = document.createElement('div');
            el.className = `key ${isBlack ? 'black' : 'white'} ${isC ? 'c-note' : ''}`;
            el.textContent = isC ? `C${octave}` : (isBlack ? '' : '');
            kb.appendChild(el);
        }
    }

    // ===== COLOR UTILS =====
    function hsl(h, s, l, a=1) {
        return `hsla(${h}, ${s}%, ${l}%, ${a})`;
    }

    function idScoreToColor(score) {
        // 0 = cool blue, 50+ = hot pink/red
        const t = Math.min(score / 120, 1);
        const h = 240 - t * 240; // blue → red
        const s = 70 + t * 20;
        const l = 45 + t * 15;
        return hsl(h, s, l);
    }

    function regimeColor(state) {
        if (state.includes('Stateless')) return { bg: 'rgba(251, 146, 60, 0.12)', border: 'rgba(251, 146, 60, 0.5)', label: 'Portal' };
        return { bg: 'rgba(16, 185, 129, 0.08)', border: 'rgba(16, 185, 129, 0.35)', label: 'Stateful' };
    }

    // ===== RENDER =====
    function render() {
        if (!analysisData) return;
        const notes = analysisData.notes;
        const regimes = analysisData.regimes;

        const canvas = document.getElementById('rollCanvas');
        const ctx = canvas.getContext('2d');
        const pitchRange = PITCH_MAX - PITCH_MIN + 1;

        // Calculate canvas dimensions — auto-zoom to fit within browser limits
        const maxTime = Math.max(...notes.map(n => n.onset + n.duration)) + 500;
        MS_PER_PX = Math.min(0.8, MAX_CANVAS_PX / maxTime);  // auto-fit
        const canvasW = Math.max(maxTime * MS_PER_PX, 1200);
        const canvasH = pitchRange * NOTE_HEIGHT;

        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvasW * dpr;
        canvas.height = canvasH * dpr;
        canvas.style.width = canvasW + 'px';
        canvas.style.height = canvasH + 'px';
        ctx.scale(dpr, dpr);

        // Clear
        ctx.fillStyle = var_bg_primary;
        ctx.fillRect(0, 0, canvasW, canvasH);

        // Grid lines (pitch rows)
        for (let p = PITCH_MIN; p <= PITCH_MAX; p++) {
            const y = (PITCH_MAX - p) * NOTE_HEIGHT;
            const pc = p % 12;
            const isBlack = BLACK_KEYS.includes(pc);
            ctx.fillStyle = isBlack ? 'rgba(255,255,255,0.015)' : 'transparent';
            ctx.fillRect(0, y, canvasW, NOTE_HEIGHT);
            ctx.strokeStyle = var_grid_line;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvasW, y);
            ctx.stroke();
        }

        // Beat grid lines (every 500ms ≈ 1 beat at 120bpm)
        for (let t = 0; t < maxTime; t += 500) {
            const x = t * MS_PER_PX;
            ctx.strokeStyle = t % 2000 === 0 ? var_grid_line_beat : var_grid_line;
            ctx.lineWidth = t % 2000 === 0 ? 1 : 0.5;
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvasH);
            ctx.stroke();
        }

        // === VIEW: Phase 1 Regime Blocks ===
        if (currentView === 'phase1') {
            for (const r of regimes) {
                const x = r.start_time * MS_PER_PX;
                const w = (r.end_time - r.start_time) * MS_PER_PX;
                const colors = regimeColor(r.state);
                ctx.fillStyle = colors.bg;
                ctx.fillRect(x, 0, w, canvasH);
                ctx.strokeStyle = colors.border;
                ctx.lineWidth = 1;
                ctx.strokeRect(x, 0, w, canvasH);

                // Regime label
                ctx.font = '9px Inter';
                ctx.fillStyle = colors.border;
                ctx.fillText(colors.label, x + 4, 12);
            }
        }

        // === DRAW NOTES ===
        for (const n of notes) {
            const x = n.onset * MS_PER_PX;
            const w = Math.max(n.duration * MS_PER_PX, 2);
            const y = (PITCH_MAX - n.pitch) * NOTE_HEIGHT;

            let fillColor, strokeColor;

            if (currentView === 'raw') {
                const velAlpha = 0.4 + (n.velocity / 127) * 0.6;
                fillColor = hsl(220, 70, 60, velAlpha);
                strokeColor = hsl(220, 80, 70, 0.7);
            } else if (currentView === 'phase1') {
                // Color by which regime the note belongs to
                const regime = regimes.find(r => n.onset >= r.start_time && n.onset < r.end_time);
                if (regime && regime.state.includes('Stateless')) {
                    fillColor = 'rgba(251, 146, 60, 0.75)';
                    strokeColor = 'rgba(251, 146, 60, 1)';
                } else {
                    fillColor = 'rgba(16, 185, 129, 0.6)';
                    strokeColor = 'rgba(16, 185, 129, 0.9)';
                }
            } else if (currentView === 'phase2') {
                fillColor = idScoreToColor(n.id_score);
                strokeColor = idScoreToColor(n.id_score);
                // Melody notes get a glow
                if (n.voice_tag.includes('Voice 1')) {
                    ctx.shadowColor = 'rgba(236, 72, 153, 0.5)';
                    ctx.shadowBlur = 6;
                } else {
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                }
            }

            ctx.fillStyle = fillColor;
            ctx.beginPath();
            ctx.roundRect(x, y + 1, w, NOTE_HEIGHT - 2, 2);
            ctx.fill();

            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 0.5;
            ctx.stroke();

            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
        }

        // Update legend
        updateLegend();
    }

    // ===== LEGEND =====
    function updateLegend() {
        const legend = document.getElementById('legend');
        if (currentView === 'raw') {
            legend.innerHTML = `
                <h3>Piano Roll</h3>
                <div class="legend-item"><div class="legend-swatch" style="background: ${hsl(220,70,60,0.5)}"></div>Quiet Note</div>
                <div class="legend-item"><div class="legend-swatch" style="background: ${hsl(220,70,60,1)}"></div>Loud Note</div>
            `;
        } else if (currentView === 'phase1') {
            legend.innerHTML = `
                <h3>Phase 1 — Harmonic Canvas</h3>
                <div class="legend-item"><div class="legend-swatch" style="background: rgba(16,185,129,0.6)"></div>Stateful (Solid/Liquid)</div>
                <div class="legend-item"><div class="legend-swatch" style="background: rgba(251,146,60,0.75)"></div>Stateless (Portal/Gas)</div>
            `;
        } else if (currentView === 'phase2') {
            legend.innerHTML = `
                <h3>Phase 2 — Information Density</h3>
                <div class="legend-item"><div class="legend-swatch" style="background: ${hsl(240,70,45)}"></div>Low I<sub>d</sub> (Background)</div>
                <div class="legend-item"><div class="legend-swatch" style="background: ${hsl(120,80,52)}"></div>Medium I<sub>d</sub></div>
                <div class="legend-item"><div class="legend-swatch" style="background: ${hsl(0,90,60)}; box-shadow: 0 0 8px rgba(236,72,153,0.5);"></div>High I<sub>d</sub> (Melody)</div>
            `;
        }
    }

    // CSS variable values for canvas
    const var_bg_primary = '#0d0d12';
    const var_grid_line = 'rgba(255,255,255,0.04)';
    const var_grid_line_beat = 'rgba(255,255,255,0.08)';

    // ===== TOOLTIP =====
    const tooltipEl = document.getElementById('tooltip');
    document.getElementById('rollCanvas').addEventListener('mousemove', (e) => {
        if (!analysisData) return;
        const rect = e.target.getBoundingClientRect();
        const mx = (e.clientX - rect.left);
        const my = (e.clientY - rect.top);

        const timeMs = mx / MS_PER_PX;
        const pitch = PITCH_MAX - Math.floor(my / NOTE_HEIGHT);

        const hit = analysisData.notes.find(n =>
            pitch === n.pitch &&
            timeMs >= n.onset &&
            timeMs <= n.onset + n.duration
        );

        if (hit) {
            const noteName = NOTE_NAMES[hit.pitch % 12] + (Math.floor(hit.pitch / 12) - 1);
            tooltipEl.style.display = 'block';
            tooltipEl.style.left = (e.clientX + 14) + 'px';
            tooltipEl.style.top = (e.clientY + 14) + 'px';
            tooltipEl.innerHTML = `
                <div class="tt-label">${noteName} (MIDI ${hit.pitch})</div>
                <div class="tt-detail">
                    Velocity: ${hit.velocity}<br>
                    Onset: ${hit.onset}ms<br>
                    Duration: ${hit.duration}ms<br>
                    I<sub>d</sub> Score: ${hit.id_score}<br>
                    Tag: ${hit.voice_tag}
                </div>
            `;
        } else {
            tooltipEl.style.display = 'none';
        }
    });
    document.getElementById('rollCanvas').addEventListener('mouseleave', () => {
        tooltipEl.style.display = 'none';
    });

    // ===== SYNC SCROLL =====
    const wrapper = document.getElementById('canvasWrapper');
    const keyboard = document.getElementById('keyboard');
    wrapper.addEventListener('scroll', () => {
        keyboard.scrollTop = wrapper.scrollTop;
    });

    // ===== TAB SWITCHING =====
    document.querySelectorAll('.view-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentView = tab.dataset.view;
            render();
        });
    });

    // ===== BOOT =====
    loadData();
    </script>
</body>
</html>
